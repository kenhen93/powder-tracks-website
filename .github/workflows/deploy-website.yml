name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allow manual deploys from the Actions tab

# Only one deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pure static site — no build step. Publish the repo root as-is.
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=powdertracks --branch=main
